<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  overflow-x: hidden;
}

.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
}

.content {
  margin-left: 220px;
}

.card-box {
  border-radius: 10px;
  color: white;
  padding: 20px;
}

.bg-blue { background: #0d6efd; }
.bg-green { background: #198754; }
.bg-orange { background: #fd7e14; }
.bg-red { background: #dc3545; }
</style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar bg-dark text-white p-3">
  <h4 class="text-center">Admin</h4>
  <hr>

  <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-people"></i> Students</a></li>
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-file-text"></i> Tests</a></li>
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-bar-chart"></i> Results</a></li>
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-building"></i> Companies</a></li>
    <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
  </ul>
</div>

<div class="content p-4">

  <h2>Dashboard</h2>

  <div class="row mt-4">
    <div class="col-md-3">
      <div class="card-box bg-blue">
        <h5>Total Students</h5>
        <h3 id="students">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box bg-green">
        <h5>Total Tests</h5>
        <h3 id="tests">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box bg-orange">
        <h5>Average Score</h5>
        <h3 id="avgScore">0%</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box bg-red">
        <h5>Companies</h5>
        <h3 id="companies">0</h3>
      </div>
    </div>
  </div>

  <div class="card mt-5 p-3">
    <h5>Student Performance</h5>
    <canvas id="myChart"></canvas>
  </div>


  <div class="card mt-5 p-3">
    <h5>Recent Students</h5>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>
  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
