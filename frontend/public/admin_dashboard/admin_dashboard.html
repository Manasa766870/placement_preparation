<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  position: absolute;
  width: 100%;
  z-index: 10;
  color: white;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.logout-btn {
  background: #28a745;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 80px;
  color: white;
  background: linear-gradient(to right, rgba(11,29,81,0.9), rgba(30,60,114,0.8)),
              url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center/cover;
}

/* LEFT CONTENT */
.hero-text {
  max-width: 500px;
}

.hero-text h1 {
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 20px;
}

.hero-text p {
  font-size: 16px;
  margin-bottom: 25px;
  opacity: 0.9;
}

/* BUTTONS */
.hero-buttons {
  display: flex;
  gap: 15px;
}

.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.btn-green {
  background: #28a745;
  color: white;
}

.btn-light {
  background: white;
  color: black;
}

/* ACTION CARDS */
.actions {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.action-card {
  background: rgba(255,255,255,0.1);
  padding: 15px 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.action-card:hover {
  background: rgba(255,255,255,0.2);
}

.action-card i {
  font-size: 20px;
  margin-bottom: 5px;
}

/* FORM SECTION */
.container {
  padding: 40px;
  background: #f5f5f5;
}

/* FORMS */
.form-box {
  display: none;
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.form-box.active {
  display: block;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 5px;
}

button {
  background: #28a745;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.status {
  margin-top: 10px;
  padding: 10px;
  border-radius: 5px;
}

.status.success {
  background: #d4edda;
  color: #155724;
}

.status.error {
  background: #f8d7da;
  color: #721c24;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  background: #0b1d51;
  color: white;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">PlacementPrep<br> Admin</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <h1>Manage Your Platform <br> Like a Pro</h1>
    <p>Upload videos, PDFs, and questions to help students succeed.</p>

    <div class="hero-buttons">
      <button class="btn btn-green" onclick="scrollToForms()">Get Started</button>
      <button class="btn btn-light">Learn More</button>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions">
      <div class="action-card" onclick="showForm('video')">
        <i class="bi bi-camera-video"></i>
        <p>Upload Video</p>
      </div>

      <div class="action-card" onclick="showForm('pdf')">
        <i class="bi bi-file-earmark-pdf"></i>
        <p>Upload PDF</p>
      </div>

      <div class="action-card" onclick="showForm('question')">
        <i class="bi bi-question-circle"></i>
        <p>Add Question</p>
      </div>
    </div>

  </div>

</section>

<!-- FORMS -->
<div class="container" id="formSection">

  <div id="videoForm" class="form-box">
    <h3>Upload Video</h3>
    <form id="videoUploadForm" enctype="multipart/form-data">
      <input type="text" name="title" placeholder="Title" required>
      <input type="text" name="topic" placeholder="Topic (DSA/Aptitude)" required>
      <input type="file" name="video" accept="video/*" required>
      <button type="submit">Upload Video</button>
    </form>
    <div id="videoStatus" class="status"></div>
  </div>

  <div id="pdfForm" class="form-box">
    <h3>Upload PDF</h3>
    <form id="pdfUploadForm" enctype="multipart/form-data">
      <input type="text" name="title" placeholder="Title" required>
      <input type="text" name="topic" placeholder="Topic (DSA/Aptitude)" required>
      <input type="file" name="pdf" accept="application/pdf" required>
      <button type="submit">Upload PDF</button>
    </form>
    <div id="pdfStatus" class="status"></div>
  </div>

  <div id="questionFormDiv" class="form-box">
    <h3>Add Question</h3>
    <form id="questionForm">
      <input type="text" name="question" placeholder="Question" required>
      <input type="text" name="option1" placeholder="Option 1" required>
      <input type="text" name="option2" placeholder="Option 2" required>
      <input type="text" name="option3" placeholder="Option 3" required>
      <input type="text" name="option4" placeholder="Option 4" required>
      <input type="number" name="correct_option" placeholder="Correct option (1-4)" required>
      <select name="topic">
        <option value="Aptitude">Aptitude</option>
        <option value="DSA">DSA</option>
      </select>
      <button type="submit">Add Question</button>
    </form>
    <div id="questionStatus" class="status"></div>
  </div>

</div>

<footer>
  © 2026 Placement Prep Platform
</footer>

<script>
function showForm(type) {
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });

  document.getElementById('videoForm').classList.remove('active');
  document.getElementById('pdfForm').classList.remove('active');
  document.getElementById('questionFormDiv').classList.remove('active');

  if(type === 'video') document.getElementById('videoForm').classList.add('active');
  if(type === 'pdf') document.getElementById('pdfForm').classList.add('active');
  if(type === 'question') document.getElementById('questionFormDiv').classList.add('active');
}

function scrollToForms() {
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
}

function logout() {
  localStorage.clear();
  window.location.href = '../admin_login.html';
}

// Video Upload Logic
document.getElementById('videoUploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const statusDiv = document.getElementById('videoStatus');
  
  statusDiv.innerHTML = '⏳ Uploading video...';
  statusDiv.className = 'status';
  
  try {
    const res = await fetch('http://localhost:5000/api/admin/upload-video', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    
    if(res.ok) {
      statusDiv.innerHTML = '✅ Video uploaded successfully!';
      statusDiv.className = 'status success';
      e.target.reset();
      setTimeout(() => {
        statusDiv.innerHTML = '';
        statusDiv.className = 'status';
      }, 3000);
    } else {
      statusDiv.innerHTML = data.message || '❌ Upload failed';
      statusDiv.className = 'status error';
    }
  } catch(err) {
    statusDiv.innerHTML = '❌ Server error. Make sure backend is running on port 5000';
    statusDiv.className = 'status error';
  }
});

// PDF Upload Logic
document.getElementById('pdfUploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const statusDiv = document.getElementById('pdfStatus');
  
  statusDiv.innerHTML = '⏳ Uploading PDF...';
  statusDiv.className = 'status';
  
  try {
    const res = await fetch('http://localhost:5000/api/admin/upload-pdf', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    
    if(res.ok) {
      statusDiv.innerHTML = '✅ PDF uploaded successfully!';
      statusDiv.className = 'status success';
      e.target.reset();
      setTimeout(() => {
        statusDiv.innerHTML = '';
        statusDiv.className = 'status';
      }, 3000);
    } else {
      statusDiv.innerHTML = data.message || '❌ Upload failed';
      statusDiv.className = 'status error';
    }
  } catch(err) {
    statusDiv.innerHTML = '❌ Server error. Make sure backend is running on port 5000';
    statusDiv.className = 'status error';
  }
});

// Add Question Logic
document.getElementById('questionForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const statusDiv = document.getElementById('questionStatus');
  
  statusDiv.innerHTML = '⏳ Adding question...';
  statusDiv.className = 'status';
  
  const questionData = {
    question: formData.get('question'),
    option1: formData.get('option1'),
    option2: formData.get('option2'),
    option3: formData.get('option3'),
    option4: formData.get('option4'),
    correct_option: parseInt(formData.get('correct_option')),
    topic: formData.get('topic')
  };
  
  try {
    const res = await fetch('http://localhost:5000/api/admin/add-question', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(questionData)
    });
    const data = await res.json();
    
    if(res.ok) {
      statusDiv.innerHTML = '✅ Question added successfully!';
      statusDiv.className = 'status success';
      e.target.reset();
      setTimeout(() => {
        statusDiv.innerHTML = '';
        statusDiv.className = 'status';
      }, 3000);
    } else {
      statusDiv.innerHTML = data.message || '❌ Failed to add question';
      statusDiv.className = 'status error';
    }
  } catch(err) {
    statusDiv.innerHTML = '❌ Server error. Make sure backend is running on port 5000';
    statusDiv.className = 'status error';
  }
});
</script>

</body>
</html>
