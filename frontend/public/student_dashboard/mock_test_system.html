<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mock Test</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4ffef5, #17f3ff);
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h2 {
  text-align: center;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
}

.options label {
  display: block;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  background: #f1f1f1;
  cursor: pointer;
}

.options input {
  margin-right: 10px;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn:hover {
  background: #0b5ed7;
}

.result {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Mock Test</h2>

  <div id="quizBox">
    <div class="question" id="question">Loading...</div>

    <div class="options" id="options"></div>

    <button class="btn" onclick="nextQuestion()">Next</button>
  </div>

  <div id="resultBox" style="display:none;">
    <p class="result" id="resultText"></p>
    <button class="btn" onclick="goHome()">Go Home</button>
  </div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let score = 0;
let selected = null;

// ✅ Load questions from backend
async function loadQuestions() {
  const topic = localStorage.getItem("testTopic");
  console.log("Topic:", topic); // 👈 DEBUG

  try {
    const res = await fetch(`http://localhost:5000/api/user/questions/${topic}`);
    const data = await res.json();

    console.log("Questions:", data); // 👈 DEBUG

    questions = data;

    if (!questions.length) {
      document.getElementById("question").innerText = "No questions available";
      return;
    }

    showQuestion();

  } catch (err) {
    console.error(err);
    document.getElementById("question").innerText = "Error loading questions";
  }
}

// ✅ Show question
function showQuestion() {
  selected = null;

  const q = questions[currentIndex];

  document.getElementById("question").innerText =
    `Q${currentIndex + 1}. ${q.question}`;

  const optionsHTML = `
    <label><input type="radio" name="opt" value="1"> ${q.option1}</label>
    <label><input type="radio" name="opt" value="2"> ${q.option2}</label>
    <label><input type="radio" name="opt" value="3"> ${q.option3}</label>
    <label><input type="radio" name="opt" value="4"> ${q.option4}</label>
  `;

  document.getElementById("options").innerHTML = optionsHTML;
}

// ✅ Next question
function nextQuestion() {
  const selectedOption = document.querySelector('input[name="opt"]:checked');

  if (!selectedOption) {
    alert("Please select an option");
    return;
  }

  const answer = selectedOption.value;

  if (answer == questions[currentIndex].correct_option) {
    score++;
  }

  currentIndex++;

  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    finishTest();
  }
}

// ✅ Finish test
async function finishTest() {
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("resultBox").style.display = "block";

  const total = questions.length;
  const percent = Math.round((score / total) * 100);

  document.getElementById("resultText").innerText =
    `You scored ${score} / ${total} (${percent}%)`;

  // ✅ Save result to backend
  try {
    await fetch("http://localhost:5000/api/user/save-result", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: localStorage.getItem("user"),
        score,
        total,
        topic: localStorage.getItem("testTopic")
      })
    });
  } catch (err) {
    console.error("Error saving result", err);
  }
}

// ✅ Go back
function goHome() {
  window.location.href = "student_dashboard.html";
}

// Load on start
loadQuestions();
</script>

</body>
</html>
