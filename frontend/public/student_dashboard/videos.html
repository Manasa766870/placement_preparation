<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Resources</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b1d51 0%, #1a3a6e 100%);
}

/* Navbar */
.navbar {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 15px 25px;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* Container */
.container {
  padding: 30px;
}

/* Title */
.title {
  text-align: center;
  color: white;
  margin-bottom: 30px;
}

/* Grid */
#videoContainer {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
}

/* Card */
.video-card {
  background: rgba(255,255,255,0.95);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.video-card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* Title */
.video-card h4 {
  margin: 10px 0 5px;
  color: #0f172a;
}

/* Topic */
.video-card p {
  margin-bottom: 10px;
  color: #475569;
  font-size: 14px;
}

/* Video */
video {
  width: 100%;
  border-radius: 10px;
  outline: none;
}

/* Badge */
.badge {
  display: inline-block;
  background: #00c9a7;
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="navbar" style="font-size:40px;">🎥 PlacementPrep - Video Resources</div>

<div class="container">
  <h2 class="title" style="color:white;">Learn with Videos</h2>

  <div id="videoContainer"></div>
</div>

<script>
async function loadVideos() {
  try {
    const res = await fetch("http://localhost:5000/api/user/resources");
    const data = await res.json();

    const container = document.getElementById("videoContainer");
    container.innerHTML = "";

    data.forEach(item => {
      if(item.type === "video"){
        container.innerHTML += `
          <div class="video-card">
            <span class="badge">${item.topic}</span>
            <h4>${item.title}</h4>
            <video controls>
              <source src="http://localhost:5000${item.file_path}">
            </video>
          </div>
        `;
      }
    });

  } catch (err) {
    console.error(err);
  }
}

loadVideos();
</script>

</body>
</html>
